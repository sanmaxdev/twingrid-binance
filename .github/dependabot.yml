version: 2
updates:
  # Backend Python dependencies — one grouped PR per month, minor/patch only.
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      backend:
        patterns: ["*"]
    ignore:
      # Major bumps are handled manually (they often need code changes).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
    labels: ["dependencies", "backend"]

  # Frontend npm dependencies — one grouped PR per month, minor/patch only.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
    labels: ["dependencies", "frontend"]

  # GitHub Actions — one grouped PR per month, minor/patch only.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(ci)"
    labels: ["dependencies", "ci"]

version: 2
# Security-updates only: no scheduled version-bump PRs (open-pull-requests-limit: 0).
# Dependabot still opens PRs ONLY when a real security advisory affects a dependency,
# grouped into a single PR per ecosystem to keep noise minimal.
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      backend-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      frontend-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      actions-security:
        applies-to: security-updates
        patterns: ["*"]
